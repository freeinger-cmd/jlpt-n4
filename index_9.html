<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="N4單字">
<meta name="theme-color" content="#0d0d1a">
<title>N4單字學習</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#0d0d1a;color:#fff;font-family:'Hiragino Sans','Noto Sans JP','Noto Sans TC',sans-serif;min-height:100vh;padding-bottom:70px;}

/* ── 底部導航 ── */
.nav{position:fixed;bottom:0;left:0;right:0;background:#13132a;border-top:1px solid #2a2a4a;display:flex;z-index:100;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 0;font-size:10px;color:#666;cursor:pointer;transition:color .2s;}
.nav-item.active{color:#7c6af7;}
.nav-item .ni{font-size:20px;margin-bottom:2px;}

/* ── 頁面區塊 ── */
.section{display:none;padding:0 0 16px;}
.section.active{display:block;}
.hdr{padding:16px 16px 8px;display:flex;align-items:center;justify-content:space-between;}
.hdr-title{font-size:22px;font-weight:800;}
.hdr-count{background:#1e1e3a;border-radius:20px;padding:4px 12px;font-size:12px;color:#aaa;}

/* ── 分組 Tab ── */
.ftags-wrap{overflow-x:auto;padding:0 16px 8px;scrollbar-width:none;}
.ftags-wrap::-webkit-scrollbar{display:none;}
.ftags{display:flex;gap:8px;width:max-content;}
.ftag{background:#1a1a30;border:1px solid #2a2a4a;color:#888;border-radius:20px;padding:5px 14px;font-size:12px;cursor:pointer;white-space:nowrap;transition:all .2s;font-family:inherit;}
.ftag.on{background:#7c6af7;border-color:#7c6af7;color:#fff;}

/* ── 模式切換 ── */
.mode-tabs{display:flex;background:#13132a;border-radius:12px;margin:0 16px 12px;padding:4px;}
.mode-tab{flex:1;text-align:center;padding:12px 8px;border-radius:8px;font-size:13px;cursor:pointer;color:#888;transition:all .2s;font-family:inherit;border:none;background:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
.mode-tab.active{background:#7c6af7;color:#fff;font-weight:700;}

/* ── 統計列 ── */
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:0 16px 12px;}
.stat{background:#13132a;border-radius:12px;padding:10px;text-align:center;}
.stat-num{font-size:24px;font-weight:800;}
.stat-num.blue{color:#6aaff7;}
.stat-num.green{color:#6af7b8;}
.stat-num.red{color:#f76a6a;}
.stat-label{font-size:11px;color:#666;margin-top:2px;}

/* ── 進度條 ── */
.prog-wrap{margin:0 16px 12px;background:#1a1a30;border-radius:8px;height:4px;overflow:hidden;}
.prog-bar{height:100%;background:linear-gradient(90deg,#7c6af7,#6af7b8);border-radius:8px;transition:width .4s;}

/* ── 卡片導航 ── */
.card-nav{display:flex;align-items:center;justify-content:space-between;padding:0 16px 10px;}
.cnav-btn{background:#1a1a30;border:1px solid #2a2a4a;color:#aaa;border-radius:10px;padding:8px 18px;font-size:13px;cursor:pointer;font-family:inherit;}
.card-cnt{font-size:14px;color:#888;}
.cnav-flip{background:#7c6af7;border:none;color:#fff;border-radius:10px;padding:8px 18px;font-size:13px;cursor:pointer;font-family:inherit;}

/* ── 抽認卡（翻牌動畫）── */
.card-wrap{padding:0 16px;perspective:1000px;}
.card-inner{
  position:relative;width:100%;height:270px;
  transform-style:preserve-3d;-webkit-transform-style:preserve-3d;
  transition:transform .5s cubic-bezier(.4,0,.2,1);
  cursor:pointer;border-radius:20px;
}
/* ★ Gemini 優化：切換新卡片時瞬間復位，避免看到背面 */
.card-inner.no-transition{transition:none!important;}
.card-inner.flipped{transform:rotateY(180deg);}

.card-face{
  position:absolute;width:100%;height:100%;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
  border-radius:20px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:20px;
  background:linear-gradient(135deg,#1a1a35 0%,#13132a 100%);
  border:1px solid #2a2a4a;box-shadow:0 8px 32px rgba(0,0,0,.5);
}
.card-back{transform:rotateY(180deg);}

/* ── 卡片內容 ── */
.c-tag{font-size:11px;border-radius:20px;padding:3px 10px;font-weight:700;margin-bottom:6px;}
.c-rd{font-size:15px;color:#9a9aff;text-align:center;letter-spacing:2px;margin-top:4px;}
.c-mn{font-size:18px;font-weight:700;color:#6af7b8;text-align:center;margin-top:6px;}
.mem-box{background:rgba(124,106,247,.1);border:1px solid rgba(124,106,247,.3);border-radius:10px;padding:8px 12px;margin-top:8px;width:100%;}
.mem-label{font-size:10px;color:#7c6af7;font-weight:700;margin-bottom:2px;}
.mem-text{font-size:12px;color:#ccc;line-height:1.5;}
.ex-text{font-size:11px;color:#888;text-align:center;margin-top:6px;line-height:1.6;}

/* ★ 不熟次數追蹤點點 */
.miss-tracker{display:flex;align-items:center;gap:5px;margin-top:8px;}
.miss-dot{width:10px;height:10px;border-radius:50%;border:1.5px solid #f76a6a;background:transparent;transition:background .2s;}
.miss-dot.filled{background:#f76a6a;}
.miss-count{font-size:11px;color:#f76a6a;margin-left:2px;}

/* ── 卡片提示 ── */
.card-hint{text-align:center;font-size:11px;color:#444;padding:8px 0 0;}

/* ── 手機觸控優化 ── */
button{touch-action:manipulation;-webkit-tap-highlight-color:transparent;}

/* ── 按鈕列 ── */
.vact{display:none;gap:10px;padding:12px 16px 0;}
.vact-btn{flex:1;padding:12px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:inherit;}
.vact-btn.ok{background:rgba(106,247,184,.15);color:#6af7b8;border:1px solid #6af7b8;}
.vact-btn.ng{background:rgba(247,106,106,.15);color:#f76a6a;border:1px solid #f76a6a;}
.vflip{display:flex;gap:10px;padding:12px 16px 0;}
.speak-btn{background:#1a1a30;border:1px solid #2a2a4a;color:#aaa;border-radius:12px;padding:12px;font-size:13px;cursor:pointer;font-family:inherit;flex:1;}
.flip-btn{background:#7c6af7;border:none;color:#fff;border-radius:12px;padding:12px;font-size:13px;cursor:pointer;font-family:inherit;flex:2;font-weight:700;}

/* ── 測驗模式 ── */
.qbox{padding:0 16px;}
.q-word{font-family:'Hiragino Mincho ProN','Noto Serif JP',serif;font-size:32px;font-weight:700;text-align:center;margin-bottom:4px;}
.q-sub{font-size:13px;color:#888;text-align:center;margin-bottom:16px;}
.q-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.q-opt{background:#1a1a30;border:1px solid #2a2a4a;color:#ddd;border-radius:12px;padding:12px 8px;font-size:13px;cursor:pointer;font-family:inherit;}
.q-opt.ok{background:rgba(106,247,184,.2);border-color:#6af7b8;color:#6af7b8;}
.q-opt.ng{background:rgba(247,106,106,.2);border-color:#f76a6a;color:#f76a6a;}
.q-res{padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:8px;line-height:1.6;}
.q-res.ok{background:rgba(106,247,184,.1);color:#6af7b8;}
.q-res.ng{background:rgba(247,106,106,.1);color:#f76a6a;}
.next-btn{width:100%;padding:12px;background:#7c6af7;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;font-family:inherit;}

/* ── 複習清單 ── */
.empty-state{text-align:center;padding:40px 20px;color:#666;font-size:15px;line-height:2;}
.rtabs{display:flex;gap:8px;padding:0 16px 12px;}
.rtab{background:#1a1a30;border:1px solid #2a2a4a;color:#888;border-radius:20px;padding:5px 14px;font-size:12px;cursor:pointer;font-family:inherit;}
.rtab.active{background:#7c6af7;border-color:#7c6af7;color:#fff;}
.rev-item{background:#13132a;border:1px solid #2a2a4a;border-radius:14px;padding:14px;margin:0 16px 10px;}
.rev-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;}
.rev-jp{font-family:'Hiragino Mincho ProN','Noto Serif JP',serif;font-size:20px;font-weight:700;}
.rev-rd{font-size:13px;color:#9a9aff;}
.rev-speak{background:none;border:none;font-size:18px;cursor:pointer;margin-left:auto;}
.rev-mn{font-size:14px;color:#6af7b8;margin-bottom:6px;}
.rev-miss{font-size:11px;color:#f76a6a;margin-top:4px;}

/* ── 聽力練習 ── */
.listen-card{background:linear-gradient(135deg,#1a1a35,#13132a);border:1px solid #2a2a4a;border-radius:20px;margin:0 16px;padding:40px 20px;text-align:center;min-height:220px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.listen-icon{font-size:56px;margin-bottom:12px;}
.listen-hint{font-size:13px;color:#666;margin-bottom:16px;}
.play-btn{background:#7c6af7;border:none;color:#fff;border-radius:14px;padding:14px 32px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;}
.l-jp{font-family:'Hiragino Mincho ProN','Noto Serif JP',serif;font-size:28px;font-weight:700;margin-bottom:4px;}
.l-rd{font-size:15px;color:#9a9aff;letter-spacing:2px;margin-bottom:4px;}
.l-mn{font-size:16px;color:#6af7b8;}
.lact{display:none;gap:10px;padding:12px 16px 0;}
.lplay{display:flex;gap:10px;padding:12px 16px 0;}

/* ★ Toast 提示 */
.toast{
  position:fixed;top:18px;left:50%;
  transform:translateX(-50%) translateY(-8px);
  background:#f7c46a;color:#1a0f00;
  padding:9px 22px;border-radius:20px;
  font-size:13px;font-weight:700;
  z-index:9999;opacity:0;
  transition:opacity .3s,transform .3s;
  pointer-events:none;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- ══ 單字練習 ══ -->
<div class="section active" id="s-vocab">
  <div class="hdr">
    <div class="hdr-title">單字練習</div>
    <div class="hdr-count" id="vocab-count">590 個</div>
  </div>
  <div class="ftags-wrap"><div class="ftags" id="ftags"></div></div>
  <div class="mode-tabs">
    <button class="mode-tab active" id="vm-flash" onclick="setVMode('flash')">抽認卡</button>
    <button class="mode-tab" id="vm-quiz" onclick="setVMode('quiz')">測驗</button>
  </div>

  <!-- 抽認卡 -->
  <div id="vm-flash-div">
    <div class="stats">
      <div class="stat"><div class="stat-num blue" id="sv-t">0</div><div class="stat-label">進度</div></div>
      <div class="stat"><div class="stat-num green" id="sv-k">0</div><div class="stat-label">記住了</div></div>
      <div class="stat"><div class="stat-num red" id="sv-f">0</div><div class="stat-label">需複習</div></div>
    </div>
    <div class="prog-wrap"><div class="prog-bar" id="vp" style="width:0%"></div></div>
    <div class="card-nav">
      <button class="cnav-btn" id="v-prev" onclick="vPrev()">← 上一張</button>
      <span class="card-cnt" id="vcnt">1 / 590</span>
      <button class="cnav-flip" onclick="flipCard()">翻面 →</button>
    </div>
    <div class="card-wrap">
      <div class="card-inner" id="ci" onclick="flipCard()">
        <div class="card-face card-front" id="cfront"></div>
        <div class="card-face card-back" id="cback"></div>
      </div>
    </div>
    <div class="card-hint" id="vhint">點擊卡片翻面查看意思</div>
    <div class="vflip" id="vflip">
      <button class="speak-btn" onclick="speakCurrent()">🔊 朗讀</button>
      <button class="flip-btn" onclick="flipCard()">翻面查看</button>
    </div>
    <div class="vact" id="vact">
      <button class="vact-btn ng" onclick="vAns(false)">❌ 不熟</button>
      <button class="vact-btn ok" onclick="vAns(true)">✅ 記住了</button>
    </div>
  </div>

  <!-- 測驗 -->
  <div id="vm-quiz-div" style="display:none;">
    <div class="stats">
      <div class="stat"><div class="stat-num blue" id="sv-t2">0</div><div class="stat-label">進度</div></div>
      <div class="stat"><div class="stat-num green" id="sv-k2">0</div><div class="stat-label">答對</div></div>
      <div class="stat"><div class="stat-num red" id="sv-f2">0</div><div class="stat-label">答錯</div></div>
    </div>
    <div class="qbox" id="qbox"></div>
  </div>
</div>

<!-- ══ 假名練習 ══ -->
<div class="section" id="s-kana">
  <div class="hdr"><div class="hdr-title">假名練習</div></div>
  <div class="mode-tabs">
    <button class="mode-tab active" id="km-flash" onclick="setKMode('flash')">抽認卡</button>
    <button class="mode-tab" id="km-kanji" onclick="setKMode('kanji')">漢字測驗</button>
    <button class="mode-tab" id="km-meaning" onclick="setKMode('meaning')">意思測驗</button>
  </div>
  <div id="km-flash-div">
    <div class="stats">
      <div class="stat"><div class="stat-num blue" id="sk-t">0</div><div class="stat-label">進度</div></div>
      <div class="stat"><div class="stat-num green" id="sk-k">0</div><div class="stat-label">記住了</div></div>
      <div class="stat"><div class="stat-num red" id="sk-f">0</div><div class="stat-label">需複習</div></div>
    </div>
    <div class="prog-wrap"><div class="prog-bar" id="kp" style="width:0%"></div></div>
    <div class="card-nav">
      <button class="cnav-btn" onclick="kPrev()">← 上一張</button>
      <span class="card-cnt" id="kcnt">1 / 590</span>
      <button class="cnav-flip" onclick="flipKana()">翻面 →</button>
    </div>
    <div class="card-wrap">
      <div class="card-inner" id="kci" onclick="flipKana()">
        <div class="card-face card-front" id="kfront"></div>
        <div class="card-face card-back" id="kback"></div>
      </div>
    </div>
    <div class="card-hint" id="khint">點擊卡片翻面確認漢字</div>
    <div class="vflip" id="kflip">
      <button class="speak-btn" onclick="speakKana()">🔊 朗讀</button>
      <button class="flip-btn" onclick="flipKana()">翻面查看</button>
    </div>
    <div class="vact" id="kact">
      <button class="vact-btn ng" onclick="kAns(false)">❌ 不熟</button>
      <button class="vact-btn ok" onclick="kAns(true)">✅ 記住了</button>
    </div>
  </div>
  <div id="km-kanji-div" style="display:none;"><div class="qbox" id="kquiz-kanji"></div></div>
  <div id="km-meaning-div" style="display:none;"><div class="qbox" id="kquiz-meaning"></div></div>
</div>

<!-- ══ 聽力練習 ══ -->
<div class="section" id="s-listen">
  <div class="hdr"><div class="hdr-title">聽力練習</div></div>
  <div class="stats">
    <div class="stat"><div class="stat-num blue" id="sl-t">0</div><div class="stat-label">進度</div></div>
    <div class="stat"><div class="stat-num green" id="sl-k">0</div><div class="stat-label">答對</div></div>
    <div class="stat"><div class="stat-num red" id="sl-f">0</div><div class="stat-label">需複習</div></div>
  </div>
  <div class="prog-wrap"><div class="prog-bar" id="lp" style="width:0%"></div></div>
  <div class="card-nav">
    <button class="cnav-btn" onclick="lPrev()">← 上一個</button>
    <span class="card-cnt" id="lnum">1 / 590</span>
    <div style="width:80px"></div>
  </div>
  <div class="listen-card" id="lcard">
    <div class="listen-icon">🎧</div>
    <p class="listen-hint">按下播放，聽發音猜單字</p>
    <div id="lreveal" style="display:none;"></div>
  </div>
  <div class="lplay" id="lplay">
    <button class="speak-btn" onclick="playListen()">🔊 播放</button>
    <button class="flip-btn" onclick="showListen()">顯示答案</button>
  </div>
  <div class="lact" id="lact">
    <button class="vact-btn ng" onclick="lAns(false)">❌ 不熟</button>
    <button class="vact-btn ok" onclick="lAns(true)">✅ 記住了</button>
  </div>
</div>

<!-- ══ 複習清單 ══ -->
<div class="section" id="s-review">
  <div class="hdr"><div class="hdr-title">複習清單</div></div>
  <div class="rtabs">
    <button class="rtab active" id="rt-vocab" onclick="setRTab('vocab')">單字</button>
    <button class="rtab" id="rt-kana" onclick="setRTab('kana')">假名</button>
  </div>
  <div id="rv-vocab"></div>
  <div id="rv-kana" style="display:none;"></div>
  <div style="padding:0 16px 16px;">
    <button class="next-btn" style="background:#f76a6a;" onclick="resetAll()">↺ 重置所有進度</button>
  </div>
</div>

<!-- ══ 底部導航 ══ -->
<nav class="nav">
  <div class="nav-item active" id="n-vocab" onclick="setSection('vocab')"><div class="ni">📚</div>單字</div>
  <div class="nav-item" id="n-kana" onclick="setSection('kana')"><div class="ni">🈳</div>假名</div>
  <div class="nav-item" id="n-listen" onclick="setSection('listen')"><div class="ni">🎧</div>聽力</div>
  <div class="nav-item" id="n-review" onclick="setSection('review')"><div class="ni">⭐</div>複習</div>
</nav>

<script>
// ══════════════════════════════════════════
//  品詞標籤設定
// ══════════════════════════════════════════
const TC={
  noun:{l:'名詞',bg:'rgba(106,175,247,0.2)',cl:'#6aaff7'},
  verb:{l:'動詞',bg:'rgba(106,247,184,0.2)',cl:'#6af7b8'},
  adj: {l:'形容詞',bg:'rgba(247,160,106,0.2)',cl:'#f7a06a'},
  adv: {l:'副詞',bg:'rgba(247,106,247,0.2)',cl:'#f76af7'},
  expr:{l:'表達',bg:'rgba(247,228,106,0.2)',cl:'#f7e46a'},
};

// ══════════════════════════════════════════
//  分組 Tag 設定
// ══════════════════════════════════════════
const TAGS=[
  {k:'all',l:'全部'},
  {k:'あ①',l:'あ①1-40'},{k:'あ②',l:'あ②41-100'},
  {k:'か①',l:'か①101-140'},{k:'か②',l:'か②141-200'},
  {k:'さ',l:'さ201-260'},{k:'し',l:'し261-320'},
  {k:'す',l:'す321-370'},{k:'た',l:'た371-420'},
  {k:'な',l:'な421-480'},{k:'は',l:'は481-530'},
  {k:'ま',l:'ま531-565'},{k:'新',l:'新増566+'},
];

// ══════════════════════════════════════════
//  單字資料
// ══════════════════════════════════════════
const VOCAB=[
  {jp:'挨拶',rd:'あいさつ',mn:'打招呼',pos:'noun',tag:'あ①',mem:'あいさつ＝相遇時的禮儀',ex:'毎朝、元気に挨拶しましょう。'},
  {jp:'青',rd:'あお',mn:'藍色',pos:'noun',tag:'あ①',mem:'あお→藍天的顏色',ex:'空は青いです。'},
  {jp:'青い',rd:'あおい',mn:'藍色的',pos:'adj',tag:'あ①',mem:'青い空＝藍天',ex:'青い空が好きです。'},
  {jp:'赤',rd:'あか',mn:'紅色',pos:'noun',tag:'あ①',mem:'あか→紅蘋果',ex:'赤いりんごを食べます。'},
  {jp:'秋',rd:'あき',mn:'秋天',pos:'noun',tag:'あ①',mem:'あき→落葉季節',ex:'秋になると葉が落ちます。'},
  {jp:'空き缶',rd:'あきかん',mn:'空罐子',pos:'noun',tag:'あ①',mem:'空き＝空的＋缶＝罐',ex:'空き缶を捨てないでください。'},
  {jp:'開ける',rd:'あける',mn:'打開',pos:'verb',tag:'あ①',mem:'あける→打開門窗',ex:'窓を開けてください。'},

function sh(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function $(id){return document.getElementById(id);}
function tagH(w){const t=TC[w.pos]||{l:'其他',bg:'rgba(170,170,170,0.15)',cl:'#aaa'};return`<span class="c-tag" style="background:${t.bg};color:${t.cl}">${t.l}</span>`;}
function speak(text){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='ja-JP';u.rate=0.85;u.pitch=1;
  const jp=window.speechSynthesis.getVoices().find(v=>v.lang.startsWith('ja'));
  if(jp)u.voice=jp;
  window.speechSynthesis.speak(u);
}

  setTimeout(()=>t.classList.remove('show'),2500);
}

//  狀態
// ══════════════════════════════════════════
let section='vocab',activeTag='all',vMode='flash';
let pool=[...VOCAB],vi=0,vFlipped=false;
let vKnown=new Set(),vForgot=new Set(),vHistory=[];
let vMissCount={};  // ★ 不熟次數
let qPool=[],qi=0,qAnswered=false;
let kPool=[],ki=0,kFlipped=false;
let kKnown=new Set(),kForgot=new Set(),kHistory=[];
let kkPool=[],kki=0,kkAnswered=false;
let kmPool=[],kmi=0,kmAnswered=false;
let lPool=[],li=0,lHistory=[];
let lKnown=new Set(),lForgot=new Set();
let rTab='vocab';

// ══════════════════════════════════════════
//  localStorage
// ══════════════════════════════════════════
function save(){
  try{
    localStorage.setItem('n4_vK',JSON.stringify([...vKnown]));
    localStorage.setItem('n4_vF',JSON.stringify([...vForgot]));
    localStorage.setItem('n4_mc',JSON.stringify(vMissCount));
    localStorage.setItem('n4_kK',JSON.stringify([...kKnown]));
    localStorage.setItem('n4_kF',JSON.stringify([...kForgot]));
    localStorage.setItem('n4_lK',JSON.stringify([...lKnown]));
    localStorage.setItem('n4_lF',JSON.stringify([...lForgot]));
  }catch(e){}
}
function load(){
  try{
    const vk=localStorage.getItem('n4_vK');if(vk)vKnown=new Set(JSON.parse(vk));
    const vf=localStorage.getItem('n4_vF');if(vf)vForgot=new Set(JSON.parse(vf));
    const mc=localStorage.getItem('n4_mc');if(mc)vMissCount=JSON.parse(mc);
    const kk=localStorage.getItem('n4_kK');if(kk)kKnown=new Set(JSON.parse(kk));
    const kf=localStorage.getItem('n4_kF');if(kf)kForgot=new Set(JSON.parse(kf));
    const lk=localStorage.getItem('n4_lK');if(lk)lKnown=new Set(JSON.parse(lk));
    const lf=localStorage.getItem('n4_lF');if(lf)lForgot=new Set(JSON.parse(lf));
  }catch(e){}
}
function resetAll(){
  if(!confirm('確定要重置所有進度嗎？'))return;
  [vKnown,vForgot,kKnown,kForgot,lKnown,lForgot].forEach(s=>s.clear());
  vHistory=[];kHistory=[];lHistory=[];vi=0;ki=0;li=0;vMissCount={};
  try{localStorage.clear();}catch(e){}
  updateVStats();updateKStats();updateLStats();
  renderCard();renderKanaCard();
  showToast('✓ 已重置所有進度');
}

// ══════════════════════════════════════════
//  導航
// ══════════════════════════════════════════
function setSection(s){
  section=s;
  document.querySelectorAll('.section').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  $('s-'+s).classList.add('active');$('n-'+s).classList.add('active');
  if(s==='listen'){lPool=sh([...pool]);li=0;lHistory=[];renderListen();}
  if(s==='review')renderReview();
  if(s==='kana'){buildKPool();renderKanaCard();}
}

// ══════════════════════════════════════════
//  單字 – 抽認卡
// ══════════════════════════════════════════
function buildPool(){
  pool=activeTag==='all'?[...VOCAB]:VOCAB.filter(w=>w.tag===activeTag);
  vi=0;vFlipped=false;vHistory=[];
  $('vocab-count').textContent=pool.length+' 個';
  updateVStats();
}
function renderFTags(){
  $('ftags').innerHTML=TAGS.map(t=>{
    const cnt=t.k==='all'?VOCAB.length:VOCAB.filter(w=>w.tag===t.k).length;
    return`<button class="ftag ${activeTag===t.k?'on':''}" onclick="setTag('${t.k}')">${t.l}(${cnt})</button>`;
  }).join('');
}
function setTag(t){
  activeTag=t;buildPool();renderFTags();
  vKnown.clear();vForgot.clear();
  if(vMode==='flash')renderCard();
  else{qPool=sh([...pool]);qi=0;renderQCard();}
  lPool=sh([...pool]);li=0;
}
function setVMode(m){
  vMode=m;
  ['flash','quiz'].forEach(x=>{
    $('vm-'+x+'-div').style.display=x===m?'block':'none';
    $('vm-'+x).classList.toggle('active',x===m);
  });
  if(m==='flash'){vi=0;vFlipped=false;vKnown.clear();vForgot.clear();vHistory=[];updateVStats();renderCard();}
  else{qPool=sh([...pool]);qi=0;qAnswered=false;renderQCard();}
}

// ★ 渲染不熟次數點點
function missDotsHTML(rd){
  const c=Math.min(vMissCount[rd]||0,5);
  if(c===0)return'';
  let dots='';
  for(let i=0;i<5;i++) dots+=`<div class="miss-dot ${i<c?'filled':''}"></div>`;
  return`<div class="miss-tracker">${dots}<span class="miss-count">${c}/5${c>=5?' ⭐':''}</span></div>`;
}

function renderCard(){
  if($('v-prev'))$('v-prev').style.opacity=vi===0?'0.3':'1';
  if(vi>=pool.length){
    $('cfront').innerHTML=`<div style="font-size:48px">🎉</div><div style="color:rgba(255,255,255,0.5);margin-top:0.5rem">這批全部完成！</div><div style="font-size:12px;color:rgba(255,255,255,0.3);margin-top:0.3rem">去「複習清單」看需要加強的</div>`;
    $('cback').innerHTML='';$('vact').style.display='none';$('vflip').style.display='none';$('vhint').style.display='none';
    $('vcnt').textContent=`${pool.length} / ${pool.length}`;return;
  }
  const w=pool[vi];

  // ★ Gemini 優化：切換新卡時瞬間翻回正面，不顯示背面動畫
  const card=$('ci');
  vFlipped=false;
  card.classList.add('no-transition');
  card.classList.remove('flipped');
  setTimeout(()=>card.classList.remove('no-transition'),20);

  $('vact').style.display='none';$('vflip').style.display='flex';$('vhint').style.display='block';
  $('vcnt').textContent=`${vi+1} / ${pool.length}`;

  $('cfront').innerHTML=`
    ${tagH(w)}
    <div style="font-size:11px;color:rgba(255,255,255,0.4);margin-bottom:0.5rem">這個讀音是哪個漢字？</div>
    <div style="font-family:'Hiragino Mincho ProN','Noto Serif JP',serif;font-size:36px;font-weight:700;letter-spacing:4px;text-align:center">${w.rd}</div>
    ${missDotsHTML(w.rd)}
    <div style="font-size:11px;color:rgba(255,255,255,0.15);margin-top:0.5rem">點擊翻面確認漢字</div>`;

  $('cback').innerHTML=`
    ${tagH(w)}
    <div style="font-family:'Hiragino Mincho ProN','Noto Serif JP',serif;font-size:28px;font-weight:700;text-align:center">${w.jp}</div>
    <div class="c-rd">${w.rd}</div>
    <div class="c-mn">${w.mn}</div>
    <div class="mem-box"><div class="mem-label">記憶技巧</div><div class="mem-text">${w.mem}</div></div>
    <div class="ex-text">例：${w.ex}</div>`;
}

function flipCard(){
  const card=$('ci');
  vFlipped=!vFlipped;
  card.classList.toggle('flipped',vFlipped);
  if(vFlipped){$('vact').style.display='flex';$('vflip').style.display='none';$('vhint').style.display='none';}
}

function vAns(ok){
  vHistory.push({idx:vi,ok});
  if(ok){
    vKnown.add(vi);
    vForgot.delete(vi);
  } else {
    vForgot.add(vi);
    vKnown.delete(vi);
    const key=pool[vi].rd;
    vMissCount[key]=(vMissCount[key]||0)+1;
    // ★ 不熟5次 → 自動加星號
    if(vMissCount[key]===5){
      pool[vi].star=true;
      showToast('⭐ 不熟5次！已加入重點複習！');
    }
  }
  vi++;updateVStats();save();
  // ★ 先翻回正面，等復位完成後再載入新卡，避免看到答案
  const card=$('ci');
  card.classList.add('no-transition');
  card.classList.remove('flipped');
  $('vact').style.display='none';
  $('vflip').style.display='flex';
  setTimeout(()=>{ card.classList.remove('no-transition'); renderCard(); },30);
}

function vPrev(){
  if(vi===0)return;
  const last=vHistory.pop();
  if(last){if(last.ok)vKnown.delete(last.idx);else vForgot.delete(last.idx);}
  vi--;vFlipped=false;updateVStats();renderCard();
}

function updateVStats(){
  const t=vKnown.size+vForgot.size;
  $('sv-t').textContent=t;$('sv-k').textContent=vKnown.size;$('sv-f').textContent=vForgot.size;
  $('vp').style.width=Math.round((t/Math.max(pool.length,1))*100)+'%';
}
function speakCurrent(){if(vi<pool.length)speak(pool[vi].rd);}

//  單字 – 測驗
// ══════════════════════════════════════════
function renderQCard(){
  if(qi>=qPool.length){
    $('qbox').innerHTML=`<div class="empty-state">🎊 完成！答對 ${vKnown.size}/${qPool.length}</div>
    <button class="next-btn" onclick="qPool=sh([...pool]);qi=0;vKnown.clear();vForgot.clear();renderQCard()">再做一次</button>`;
    return;
  }
  const w=qPool[qi];
  const others=pool.filter(v=>v.jp!==w.jp);sh(others);
  const opts=sh([w,...others.slice(0,3)]);
  qAnswered=false;
  $('qbox').innerHTML=`
    <div class="q-word">${w.jp}</div>
    <div class="q-sub">${w.rd} の意思は？</div>
    <div class="q-opts" id="vopts"></div>
    <div id="qr"></div>
    <button class="next-btn" id="qn" style="display:none" onclick="qi++;renderQCard()">下一題 →</button>`;
  // ★ 用 data-idx 避免特殊字元造成 onclick 斷裂
  opts.forEach((o,i)=>{
    const btn=document.createElement('button');
    btn.className='q-opt';
    btn.textContent=o.mn;
    btn.dataset.idx=i;
    btn.addEventListener('click',()=>checkVQ(btn, o.mn, w.mn));
    $('vopts').appendChild(btn);
  });
}
function checkVQ(el,ch,co){
  if(qAnswered)return;qAnswered=true;
  const w=qPool[qi];
  document.querySelectorAll('#vopts .q-opt').forEach(b=>b.disabled=true);
  if(ch===co){
    el.classList.add('ok');vKnown.add(qi);
    $('qr').innerHTML=`<div class="q-res ok">✅ 正確！${w.mem}</div>`;
  } else {
    el.classList.add('ng');vForgot.add(qi);
    document.querySelectorAll('#vopts .q-opt').forEach(b=>{if(b.textContent===co)b.classList.add('ok');});
    $('qr').innerHTML=`<div class="q-res ng">❌ 答錯。正確：${co}<br>${w.mem}</div>`;
  }
  $('qn').style.display='block';updateVStats();save();
}

function renderReview(){

        <div class="rev-mn">${w.mn}</div>

        <div class="mem-box"><div class="mem-label">記憶技巧</div><div class="mem-text">${w.mem}</div></div>

    }).join('');

  const klist=[...kForgot].map(i=>kPool[i]).filter(Boolean);
  $('rv-kana').innerHTML=klist.length===0
    ?`<div class="empty-state">🎉 沒有需要複習的假名！</div>`
    :klist.map(w=>`<div class="rev-item">
      <div class="rev-row"><span class="rev-jp" style="font-size:20px;letter-spacing:2px">${w.rd}</span><button class="rev-speak" onclick="speak('${w.rd}')">🔊</button></div>
      <div style="font-size:17px;font-weight:700;margin-bottom:4px">${w.jp}</div>
      <div class="rev-mn">${w.mn}</div>
      <div class="mem-box"><div class="mem-label">記憶技巧</div><div class="mem-text">${w.mem}</div></div>
    </div>`).join('');
}

// ══════════════════════════════════════════

load();
renderFTags();
buildPool();
renderCard();
buildKPool();
lPool=sh([...VOCAB]);
if(window.speechSynthesis){
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged=()=>{};
}
</script>
