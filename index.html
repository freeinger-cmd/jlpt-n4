<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="N4單字">
<meta name="theme-color" content="#0f0f14">
<title>N4單字學習卡</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700;900&family=Noto+Sans+TC:wght@300;400;700&display=swap');

  :root {
    --bg: #0f0f14;
    --card-bg: #1a1a24;
    --card-border: #2e2e45;
    --accent: #7c6af7;
    --accent2: #f76a6a;
    --accent3: #6af7b8;
    --text: #e8e8f0;
    --text-dim: #888899;
    --star: #f7c46a;
    --noun: #6aaff7;
    --verb: #6af7b8;
    --adj: #f7a06a;
    --adv: #f76af7;
    --expr: #f7e46a;
    --other: #aaa;
    --font-size: 1;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  .topbar {
    width: 100%;
    max-width: 600px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px 6px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
    border-bottom: 1px solid var(--card-border);
  }
  .topbar-title { font-size: 1rem; font-weight: 700; color: var(--accent); letter-spacing: 2px; }
  .topbar-count { font-size: 0.78rem; color: var(--text-dim); }
  .topbar-controls { display: flex; gap: 6px; }
  .ctrl-btn {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    color: var(--text);
    border-radius: 8px;
    padding: 4px 9px;
    font-size: 0.78rem;
    cursor: pointer;
    transition: background 0.2s;
    font-family: inherit;
  }
  .ctrl-btn:hover, .ctrl-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .progress-wrap { width: 100%; max-width: 600px; padding: 5px 16px 0; background: var(--bg); }
  .progress-bar-bg { width: 100%; height: 3px; background: var(--card-border); border-radius: 4px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent3)); border-radius: 4px; transition: width 0.4s; }

  .filter-tabs {
    width: 100%; max-width: 600px;
    display: flex; gap: 5px;
    padding: 8px 16px 3px;
    overflow-x: auto; scrollbar-width: none;
    background: var(--bg);
  }
  .filter-tabs::-webkit-scrollbar { display: none; }
  .ftab {
    background: var(--card-bg); border: 1px solid var(--card-border);
    color: var(--text-dim); border-radius: 20px;
    padding: 3px 10px; font-size: 0.7rem;
    cursor: pointer; white-space: nowrap;
    transition: all 0.2s; font-family: inherit;
  }
  .ftab.active { color: #fff; border-color: transparent; }
  .ftab[data-f="all"].active  { background: var(--accent); }
  .ftab[data-f="noun"].active { background: var(--noun); color: #000; }
  .ftab[data-f="verb"].active { background: var(--verb); color: #000; }
  .ftab[data-f="adj"].active  { background: var(--adj); color: #000; }
  .ftab[data-f="adv"].active  { background: var(--adv); }
  .ftab[data-f="expr"].active { background: var(--expr); color: #000; }
  .ftab[data-f="star"].active { background: var(--star); color: #000; }

  .stats-bar {
    width: 100%; max-width: 600px;
    padding: 5px 16px 6px;
    display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;
  }
  .stat-chip {
    font-size: 0.7rem; color: var(--text-dim);
    background: var(--card-bg); border: 1px solid var(--card-border);
    border-radius: 10px; padding: 2px 9px;
  }
  .stat-chip span { font-weight: 700; color: var(--text); }

  .card-area { width: 100%; max-width: 600px; flex: 1; padding: 10px 16px 0; }

  .card-container {
    width: 100%; position: relative;
    height: 300px;
    perspective: 1000px;
    touch-action: pan-y;
  }

  .card {
    width: 100%; height: 100%;
    position: absolute;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(.4,0,.2,1);
    cursor: pointer; border-radius: 18px;
  }
  .card.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute; width: 100%; height: 100%;
    backface-visibility: hidden; border-radius: 18px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 20px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    box-shadow: 0 6px 32px rgba(0,0,0,0.5);
  }
  .card-back { transform: rotateY(180deg); }

  .card-face::before {
    content: ''; position: absolute;
    top: 0; left: 0; right: 0; height: 3px;
    border-radius: 18px 18px 0 0;
  }
  .card[data-pos="noun"] .card-face::before { background: var(--noun); }
  .card[data-pos="verb"] .card-face::before { background: var(--verb); }
  .card[data-pos="adj"]  .card-face::before { background: var(--adj); }
  .card[data-pos="adv"]  .card-face::before { background: var(--adv); }
  .card[data-pos="expr"] .card-face::before { background: var(--expr); }
  .card[data-pos="other"].card-face::before { background: var(--other); }

  .card-num { position: absolute; top: 12px; left: 16px; font-size: 0.7rem; color: var(--text-dim); }
  .star-btn {
    position: absolute; top: 8px; right: 12px;
    font-size: 1.2rem; cursor: pointer;
    background: none; border: none; padding: 4px; line-height: 1;
    transition: transform 0.2s;
  }
  .star-btn:hover { transform: scale(1.2); }

  .pos-badge {
    position: absolute; bottom: 12px; left: 16px;
    font-size: 0.65rem; padding: 2px 7px;
    border-radius: 10px; font-weight: 700; letter-spacing: 1px;
  }
  .pos-noun { background: rgba(106,175,247,0.2); color: var(--noun); }
  .pos-verb { background: rgba(106,247,184,0.2); color: var(--verb); }
  .pos-adj  { background: rgba(247,160,106,0.2); color: var(--adj); }
  .pos-adv  { background: rgba(247,106,247,0.2); color: var(--adv); }
  .pos-expr { background: rgba(247,228,106,0.2); color: var(--expr); }
  .pos-other{ background: rgba(170,170,170,0.15); color: var(--other); }

  .miss-counter { position: absolute; bottom: 12px; right: 12px; font-size: 0.65rem; color: var(--accent2); font-weight: 700; }

  /* ── 正面：假名大字 ── */
  .card-kana {
    font-size: calc(2rem * var(--font-size));
    font-weight: 900; color: var(--text);
    text-align: center; letter-spacing: 3px; line-height: 1.3;
  }
  .card-emoji { font-size: 1.6rem; margin-top: 8px; }

  /* ── 背面：漢字＋假名＋中文＋例句 ── */
  .card-kanji {
    font-size: calc(2rem * var(--font-size));
    font-weight: 900; color: var(--text);
    text-align: center; line-height: 1.2; margin-bottom: 2px;
  }
  .card-kana-back {
    font-size: calc(0.8rem * var(--font-size));
    color: var(--text-dim); text-align: center;
    letter-spacing: 2px; margin-bottom: 6px;
  }
  .card-meaning {
    font-size: calc(1.4rem * var(--font-size));
    font-weight: 700; color: var(--accent3);
    text-align: center; margin-bottom: 8px;
  }
  .card-example {
    font-size: calc(0.75rem * var(--font-size));
    color: var(--text-dim); text-align: center;
    line-height: 1.6; max-width: 300px;
  }
  .card-example .jp { color: var(--text); font-size: calc(0.8rem * var(--font-size)); }

  .swipe-hint { text-align: center; font-size: 0.68rem; color: var(--text-dim); padding: 6px 0 2px; letter-spacing: 1px; }

  .bottom-nav {
    width: 100%; max-width: 600px;
    display: flex; gap: 8px; padding: 10px 16px;
    align-items: center; justify-content: center;
    position: sticky; bottom: 0;
    background: var(--bg); border-top: 1px solid var(--card-border);
  }
  .nav-btn {
    background: var(--card-bg); border: 1px solid var(--card-border);
    color: var(--text); border-radius: 12px;
    padding: 10px 16px; font-size: 1rem;
    cursor: pointer; transition: all 0.15s;
    flex: 1; font-family: inherit; max-width: 90px;
  }
  .nav-btn:hover { background: var(--accent); border-color: var(--accent); }
  .nav-btn.know { background: rgba(106,247,184,0.15); border-color: var(--verb); color: var(--verb); }
  .nav-btn.know:hover { background: var(--verb); color: #000; }
  .nav-btn.miss { background: rgba(247,106,106,0.15); border-color: var(--accent2); color: var(--accent2); }
  .nav-btn.miss:hover { background: var(--accent2); color: #fff; }
  .nav-center { text-align: center; flex: 1.2; }
  .nav-idx { font-size: 0.95rem; font-weight: 700; color: var(--text); }
  .nav-total { font-size: 0.7rem; color: var(--text-dim); }

  @keyframes slideInRight { from { opacity:0; transform: translateX(70px); } to { opacity:1; transform: translateX(0); } }
  @keyframes slideInLeft  { from { opacity:0; transform: translateX(-70px); } to { opacity:1; transform: translateX(0); } }
  .slide-in-right .card-face { animation: slideInRight 0.28s ease; }
  .slide-in-left .card-face  { animation: slideInLeft 0.28s ease; }

  body.font-lg { --font-size: 1.2; }
  body.font-sm { --font-size: 0.85; }
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="topbar-title">N4 單字</div>
    <div class="topbar-count" id="topbar-count">590 個單字</div>
  </div>
  <div class="topbar-controls">
    <button class="ctrl-btn" onclick="toggleFont()">🔤</button>
    <button class="ctrl-btn" onclick="shuffleCards()">🔀</button>
    <button class="ctrl-btn" onclick="resetAll()">↺</button>
  </div>
</div>

<div class="progress-wrap">
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="prog-fill" style="width:0%"></div></div>
</div>

<div class="filter-tabs">
  <button class="ftab active" data-f="all"  onclick="setFilter('all',this)">全部</button>
  <button class="ftab" data-f="noun" onclick="setFilter('noun',this)">🔵 名詞</button>
  <button class="ftab" data-f="verb" onclick="setFilter('verb',this)">🟢 動詞</button>
  <button class="ftab" data-f="adj"  onclick="setFilter('adj',this)">🟠 形容詞</button>
  <button class="ftab" data-f="adv"  onclick="setFilter('adv',this)">🟣 副詞</button>
  <button class="ftab" data-f="expr" onclick="setFilter('expr',this)">🟡 表達</button>
  <button class="ftab" data-f="star" onclick="setFilter('star',this)">⭐ 收藏</button>
</div>

<div class="stats-bar">
  <div class="stat-chip">已知 <span id="s-know">0</span></div>
  <div class="stat-chip">不熟 <span id="s-miss">0</span></div>
  <div class="stat-chip">⭐ <span id="s-star">0</span></div>
</div>

<div class="card-area">
  <div class="card-container" id="card-container"
    ontouchstart="touchStart(event)" ontouchend="touchEnd(event)">
    <div class="card" id="main-card" onclick="flipCard()">
      <div class="card-face card-front">
        <div class="card-num" id="c-num"></div>
        <button class="star-btn" id="c-star" onclick="event.stopPropagation();toggleStar()">☆</button>
        <div class="card-kana" id="c-kana"></div>
        <div class="card-emoji" id="c-emoji"></div>
        <div class="pos-badge" id="c-pos-front"></div>
        <div class="miss-counter" id="c-miss"></div>
      </div>
      <div class="card-face card-back">
        <div class="card-num" id="c-num2"></div>
        <div class="card-kanji" id="c-kanji"></div>
        <div class="card-kana-back" id="c-kana-back"></div>
        <div class="card-meaning" id="c-meaning"></div>
        <div class="card-example" id="c-example"></div>
        <div class="pos-badge" id="c-pos-back"></div>
      </div>
    </div>
  </div>
  <div class="swipe-hint">點擊翻牌 · 左右滑動切換</div>
</div>

<div class="bottom-nav">
  <button class="nav-btn" onclick="prevCard()">‹</button>
  <button class="nav-btn miss" onclick="markMiss()">✗ 不熟</button>
  <div class="nav-center">
    <div class="nav-idx" id="nav-idx">1</div>
    <div class="nav-total" id="nav-total">/ 590</div>
  </div>
  <button class="nav-btn know" onclick="markKnow()">✓ 認識</button>
  <button class="nav-btn" onclick="nextCard()">›</button>
</div>

  // ── い形容詞 ──
  [579,"うれしい","うれしい","adj","高興的","うれしい知らせがありました。","有高興的消息。","😄"],
  [580,"かなしい","かなしい","adj","悲傷的","かなしい映画を見ました。","看了悲傷的電影。","😢"],
  [581,"すばらしい","すばらしい","adj","很棒的","すばらしい景色ですね。","是絕佳的景色呢。","🌟"],
  [582,"詳しい","くわしい","adj","詳細的","詳しい説明をします。","給予詳細的說明。","📋"],
  [583,"優しい","やさしい","adj","溫柔的","優しい人が好きです。","喜歡溫柔的人。","💕"],
  [584,"細い","ほそい","adj","細的・瘦的","細い糸を使います。","使用細線。","🧵"],
  // ── な形容詞 ──
  [585,"急な","きゅうな","adj","突然的","急な用事ができました。","有突然的急事。","⚡"],
  [586,"自由","じゆう","adj","自由的","自由な時間があります。","有自由的時間。","🕊️"],

  [589,"特別","とくべつ","adj","特別的","特別な日です。","是特別的日子。","✨"],
  [590,"盛ん","さかん","adj","盛行的","盛んなスポーツです。","是盛行的運動。","🔥"],
];

const POS_MAP = {
  noun: {label:"名詞", cls:"pos-noun"},
  verb: {label:"動詞", cls:"pos-verb"},
  adj:  {label:"形容詞", cls:"pos-adj"},
  adv:  {label:"副詞/接", cls:"pos-adv"},
  expr: {label:"慣用/表達", cls:"pos-expr"},
  other:{label:"其他", cls:"pos-other"}
};

let allCards = raw.map(r => ({
  id: r[0], kanji: r[1], kana: r[2], pos: r[3],
  zh: r[4], exJp: r[5], exZh: r[6], emoji: r[7],
  know: false, miss: 0, star: false
}));

let filtered = [...allCards];
let idx = 0;
let isFlipped = false;
let currentFilter = 'all';
let fontState = 0;
let touchStartX = 0;

function getFiltered() {
  if (currentFilter === 'all') return allCards;
  if (currentFilter === 'star') return allCards.filter(c => c.star);
  return allCards.filter(c => c.pos === currentFilter);
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.ftab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  filtered = getFiltered();
  idx = 0;
  renderCard(true);
}

function renderCard(animate) {
  if (!filtered.length) return;
  const c = filtered[idx];
  isFlipped = false;
  const card = document.getElementById('main-card');
  card.classList.remove('flipped');
  card.setAttribute('data-pos', c.pos);

  document.getElementById('c-num').textContent = `#${c.id}`;
  document.getElementById('c-num2').textContent = `#${c.id}`;
  // 正面：只顯示假名
  document.getElementById('c-kana').textContent = c.kana;
  document.getElementById('c-emoji').textContent = c.emoji || '';
  // 背面：漢字＋假名＋中文＋例句
  document.getElementById('c-kanji').textContent = c.kanji !== c.kana ? c.kanji : '';
  document.getElementById('c-kana-back').textContent = c.kanji !== c.kana ? c.kana : '';
  document.getElementById('c-meaning').textContent = c.zh;
  document.getElementById('c-example').innerHTML = `<div class="jp">${c.exJp}</div><div>${c.exZh}</div>`;
  document.getElementById('c-star').textContent = c.star ? '⭐' : '☆';
  document.getElementById('c-miss').textContent = c.miss >= 5 ? '⭐'.repeat(Math.min(c.miss-4,3)) + ' 需加強' : (c.miss > 0 ? `✗ ×${c.miss}` : '');

  const pm = POS_MAP[c.pos] || POS_MAP.other;
  document.getElementById('c-pos-front').textContent = pm.label;
  document.getElementById('c-pos-front').className = 'pos-badge ' + pm.cls;
  document.getElementById('c-pos-back').textContent = pm.label;
  document.getElementById('c-pos-back').className = 'pos-badge ' + pm.cls;

  document.getElementById('nav-idx').textContent = idx + 1;
  document.getElementById('nav-total').textContent = '/ ' + filtered.length;
  const pct = filtered.length > 1 ? (idx / (filtered.length-1)) * 100 : 100;
  document.getElementById('prog-fill').style.width = pct + '%';
  updateStats();

  if (animate) {
    card.classList.add('slide-in-right');
    setTimeout(() => card.classList.remove('slide-in-right'), 300);
  }
}

function flipCard() {
  const card = document.getElementById('main-card');
  isFlipped = !isFlipped;
  card.classList.toggle('flipped', isFlipped);
}

function nextCard() {
  if (!filtered.length) return;
  idx = (idx + 1) % filtered.length;
  renderCard(true);
}

function prevCard() {
  if (!filtered.length) return;
  idx = (idx - 1 + filtered.length) % filtered.length;
  const card = document.getElementById('main-card');
  isFlipped = false;
  card.classList.remove('flipped');
  renderCard(false);
  card.classList.add('slide-in-left');
  setTimeout(() => card.classList.remove('slide-in-left'), 300);
}

function markKnow() {
  allCards[filtered[idx].id-1].know = true;
  filtered[idx].know = true;
  nextCard();
}

function markMiss() {
  allCards[filtered[idx].id-1].miss++;
  filtered[idx].miss++;
  if (filtered[idx].miss >= 5) {
    allCards[filtered[idx].id-1].star = true;
    filtered[idx].star = true;
  }
  nextCard();
}

function toggleStar() {
  const c = filtered[idx];
  c.star = !c.star;
  allCards[c.id-1].star = c.star;
  document.getElementById('c-star').textContent = c.star ? '⭐' : '☆';
  updateStats();
}

function updateStats() {
  document.getElementById('s-know').textContent = allCards.filter(c=>c.know).length;
  document.getElementById('s-miss').textContent = allCards.filter(c=>c.miss>0&&!c.know).length;
  document.getElementById('s-star').textContent = allCards.filter(c=>c.star).length;
}

function shuffleCards() {
  filtered = [...getFiltered()].sort(() => Math.random()-0.5);
  idx = 0;
  renderCard(true);
}

function resetAll() {
  allCards.forEach(c => { c.know=false; c.miss=0; c.star=false; });
  filtered = getFiltered();
  idx = 0;
  renderCard(true);
  updateStats();
}

function toggleFont() {
  fontState = (fontState+1) % 3;
  document.body.classList.remove('font-lg','font-sm');
  if (fontState===1) document.body.classList.add('font-lg');
  else if (fontState===2) document.body.classList.add('font-sm');
}

function touchStart(e) { touchStartX = e.touches[0].clientX; }
function touchEnd(e) {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) {
    if (dx < 0) nextCard();
    else prevCard();
  }
}

renderCard(false);
</script>
</body>
