<title>JLPT N4 學習助手 - Gemini 版</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans TC', sans-serif; background: #1a1a2e; color: #e8e8f0; min-height: 100vh; display: flex; flex-direction: column; }
  
  /* 頂部導航 */
  .top-nav { padding: 15px; background: #16213e; border-bottom: 1px solid #2a2a4a; display: flex; justify-content: space-between; align-items: center; }
  .top-nav h1 { font-size: 16px; color: #ffd600; }
  .count-info { font-size: 12px; color: #888; }

  /* 模式切換 */
  .mode-toggle { display: flex; margin: 12px; background: #2a2a4a; border-radius: 8px; overflow: hidden; }
  .mode-btn { flex: 1; padding: 12px; border: none; background: transparent; color: #aaa; cursor: pointer; transition: 0.3s; }
  .mode-btn.active { background: #7c4dff; color: #fff; font-weight: bold; }

  /* 卡片區域 */
  .card-container { padding: 0 12px; perspective: 1000px; flex-grow: 1; display: flex; align-items: center; }
  .card-inner { position: relative; width: 100%; height: 300px; transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
  
  /* 關鍵優化：防止切換時看到背面 */
  .card-inner.no-transition { transition: none !important; }
  .card-inner.flipped { transform: rotateY(180deg); }
  
  .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 15px; background: #16213e; border: 1px solid #2a2a4a; display: flex; flex-direction: column; padding: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
  .card-back { transform: rotateY(180deg); justify-content: center; align-items: center; text-align: center; }

  /* 不熟次數追蹤 (靠左) */
  .unfamiliar-tracker { display: flex; align-items: center; gap: 6px; margin-top: auto; }
  .unfamiliar-dots { display: flex; gap: 4px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; border: 1.5px solid #ef5350; }
  .dot.filled { background: #ef5350; }
  .dot-text { font-size: 12px; color: #ef5350; font-weight: bold; margin-left: 5px; }

  /* 卡片內容樣式 */
  .word-id { font-size: 12px; color: #444; margin-bottom: 10px; }
  .main-kana { font-size: 45px; text-align: center; margin: auto 0; }
  .back-kanji { font-size: 36px; margin-bottom: 10px; }
  .back-meaning { font-size: 20px; color: #4fc3f7; }

  /* 測驗選項區 */
  .quiz-area { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 12px; }
  .quiz-btn { background: #2a2a4a; color: #fff; border: 1px solid #3f3f5f; padding: 15px 5px; border-radius: 10px; cursor: pointer; font-size: 14px; }
  .quiz-btn:active { background: #7c4dff; }

  /* 控制按鈕 */
  .controls { padding: 12px; display: flex; gap: 10px; }
  .btn { flex: 1; padding: 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 15px; transition: 0.2s; }
  .btn-known { background: #1b3a2e; color: #66bb6a; }
  .btn-unf { background: #3a1b1b; color: #ef5350; }
  .btn-known:active { background: #2e5a47; }
  .btn-unf:active { background: #5a2e2e; }

  /* 導航按鈕 */
  .nav-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: #16213e; }
  .nav-link { color: #888; text-decoration: none; font-size: 13px; cursor: pointer; }

  /* Toast 提示 */
  .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #ffd600; color: #000; padding: 10px 25px; border-radius: 25px; font-weight: bold; opacity: 0; transition: 0.3s; z-index: 999; pointer-events: none; }
  .toast.show { opacity: 1; }
</style>
</head>

<div id="quizArea" class="quiz-area" style="display:none"></div>

<div id="cardControls" class="controls">

// 狀態管理
let state = {
  idx: 0,
  mode: 'card',
  flipped: false,
  unfData: JSON.parse(localStorage.getItem('n4_unf') || '{}'),
  knownData: JSON.parse(localStorage.getItem('n4_known') || '{}')
};

function save() {
  localStorage.setItem('n4_unf', JSON.stringify(state.unfData));
  localStorage.setItem('n4_known', JSON.stringify(state.knownData));
}

function render() {
  const item = W[state.idx];
  const cardInner = document.getElementById('cardInner');

  // 更新內容
  document.getElementById('wordId').textContent = `#${item.n}`;
  document.getElementById('mainKana').textContent = item.k;
  document.getElementById('backKanji').textContent = item.j;
  document.getElementById('backKana').textContent = item.k;
  document.getElementById('backMeaning').textContent = item.m;
  document.getElementById('progText').textContent = `${state.idx + 1} / ${W.length}`;

  // 更新紅點 (追蹤器)
  const count = state.unfData[item.n] || 0;
  let dotHTML = '';
  for(let i=1; i<=5; i++) {
    dotHTML += `<div class="dot ${i <= count ? 'filled' : ''}"></div>`;
  }
  document.getElementById('dotBox').innerHTML = dotHTML;
  document.getElementById('dotCountText').textContent = `${Math.min(count, 5)}/5`;

  // 翻轉邏輯處理
  if (state.flipped) {
    cardInner.classList.add('flipped');
  } else {
    // 切換下一張時，先移除動畫效果，瞬間轉回正面，避免看到背面答案
    cardInner.classList.add('no-transition');
    cardInner.classList.remove('flipped');
    setTimeout(() => cardInner.classList.remove('no-transition'), 20);
  }

  // 測驗模式選項生成
  if (state.mode === 'quiz') {
    renderQuizOptions(item);
  }
}

function renderQuizOptions(correctItem) {
  const quizArea = document.getElementById('quizArea');
  let options = [correctItem.m];
  while(options.length < 4) {
    let rand = W[Math.floor(Math.random()*W.length)].m;
    if(!options.includes(rand)) options.push(rand);
  }
  options.sort(() => Math.random() - 0.5);

  quizArea.innerHTML = options.map(opt => 
    `<button class="quiz-btn" onclick="checkQuiz('${opt}', '${correctItem.m}')">${opt}</button>`
  ).join('');
}

function checkQuiz(selected, correct) {
  if (selected === correct) {
    showToast("正解！ ⭕");
    mark(true);
  } else {
    showToast(`錯了！正確是：${correct} ❌`);
    mark(false);
  }
}

function handleCardClick() {
  if (state.mode === 'card') {
    state.flipped = !state.flipped;
    render();
  }
}

function setMode(m) {
  state.mode = m;
  state.flipped = false;
  document.getElementById('mCard').classList.toggle('active', m === 'card');
  document.getElementById('mQuiz').classList.toggle('active', m === 'quiz');
  document.getElementById('quizArea').style.display = m === 'quiz' ? 'grid' : 'none';
  document.getElementById('cardControls').style.display = m === 'card' ? 'flex' : 'none';
  render();
}

function mark(isKnown) {
  const item = W[state.idx];
  if (isKnown) {
    state.knownData[item.n] = true;
  } else {
    state.unfData[item.n] = (state.unfData[item.n] || 0) + 1;
    state.knownData[item.n] = false;
  }
  save();
  next();
}

function next() {
  if (state.idx < W.length - 1) {
    state.idx++;
    state.flipped = false;
    render();
  } else {
    showToast("已經是最後一張了！");
  }
}

function prev() {
  if (state.idx > 0) {
    state.idx--;
    state.flipped = false;
    render();
  }
}

function speak() {
  const msg = new SpeechSynthesisUtterance(W[state.idx].k);
  msg.lang = 'ja-JP';
  window.speechSynthesis.speak(msg);
}

function showToast(text) {
  const t = document.getElementById('toast');
  t.textContent = text;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1500);
}

// 初始啟動
render();
